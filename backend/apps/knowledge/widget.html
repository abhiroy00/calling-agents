<!-- CodingNowAI chat widget.
     Paste this before </body> on codingnowai.in and set API_BASE to the
     public URL of this Django backend (must be in CORS_ALLOWED_ORIGINS). -->
<div id="cnai-chat"></div>
<script>
(function () {
  var API_BASE = 'https://YOUR-BACKEND-DOMAIN';  // <-- change me
  var history = [];

  var root = document.getElementById('cnai-chat');
  root.innerHTML =
    '<button id="cnai-fab" aria-label="Chat with us">💬</button>' +
    '<div id="cnai-box" hidden>' +
    '  <div id="cnai-head">CodingNowAI Assistant</div>' +
    '  <div id="cnai-msgs"></div>' +
    '  <form id="cnai-form"><input id="cnai-in" placeholder="Ask about courses, fees…" autocomplete="off"/><button>➤</button></form>' +
    '</div>';

  var css = document.createElement('style');
  css.textContent =
    '#cnai-fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;border:0;background:#4f46e5;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.25);z-index:9999}' +
    '#cnai-box{position:fixed;bottom:88px;right:20px;width:340px;max-width:92vw;height:440px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.25);display:flex;flex-direction:column;overflow:hidden;z-index:9999;font-family:system-ui,sans-serif}' +
    '#cnai-head{background:#4f46e5;color:#fff;padding:12px 16px;font-weight:600}' +
    '#cnai-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}' +
    '.cnai-m{max-width:85%;padding:8px 12px;border-radius:10px;font-size:14px;line-height:1.4;white-space:pre-wrap}' +
    '.cnai-user{align-self:flex-end;background:#4f46e5;color:#fff}' +
    '.cnai-bot{align-self:flex-start;background:#f1f5f9;color:#111}' +
    '#cnai-form{display:flex;border-top:1px solid #e5e7eb}' +
    '#cnai-in{flex:1;border:0;padding:12px;font-size:14px;outline:none}' +
    '#cnai-form button{border:0;background:none;padding:0 14px;font-size:18px;color:#4f46e5;cursor:pointer}';
  document.head.appendChild(css);

  var box = document.getElementById('cnai-box');
  var msgs = document.getElementById('cnai-msgs');
  var input = document.getElementById('cnai-in');

  function add(role, text) {
    var div = document.createElement('div');
    div.className = 'cnai-m ' + (role === 'user' ? 'cnai-user' : 'cnai-bot');
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  document.getElementById('cnai-fab').onclick = function () {
    box.hidden = !box.hidden;
    if (!box.hidden && !msgs.childElementCount) {
      add('bot', 'Hi! Ask me anything about CodingNowAI courses, fees, batches, or placements.');
    }
    if (!box.hidden) input.focus();
  };

  document.getElementById('cnai-form').onsubmit = function (e) {
    e.preventDefault();
    var q = input.value.trim();
    if (!q) return;
    input.value = '';
    add('user', q);
    var pending = add('bot', '…');
    fetch(API_BASE + '/api/knowledge/chat/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, history: history }),
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        pending.textContent = data.answer || 'Sorry, something went wrong.';
        history.push({ role: 'user', content: q });
        history.push({ role: 'assistant', content: data.answer || '' });
        history = history.slice(-6);
      })
      .catch(function () {
        pending.textContent = 'Sorry, I could not reach the server. Please call +91 7464099059.';
      });
  };
})();
</script>
