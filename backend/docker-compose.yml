name: callingcrm

services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    env_file: .env.docker  # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    restart: unless-stopped
    build: .
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Loopback only - a reverse proxy on the host (or the bundled nginx
      # service, if enabled) is the public entrypoint, never daphne directly.
      - "127.0.0.1:8001:8000"
    volumes:
      - .:/app
      - static_files:/app/staticfiles

  celery:
    restart: unless-stopped
    build: .
    # Single worker process: campaign dialing is deliberately rate-limited,
    # so higher concurrency buys nothing and each process is a full Django.
    command: celery -A config worker -l info -c 1
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  nginx:
    restart: unless-stopped
    # Only for dedicated servers where ports 80/443 are free:
    #   docker compose --profile bundled-tls up -d
    # On shared hosts, terminate TLS with the host's own reverse proxy instead.
    profiles: ["bundled-tls"]
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    env_file: .env.docker  # DOMAIN - substituted into the config template
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - static_files:/app/staticfiles:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web

  certbot:
    restart: unless-stopped
    profiles: ["bundled-tls"]
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renew twice a day; nginx picks up renewed certs on reload/restart
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

volumes:
  postgres_data:
  static_files:
  certbot_certs:
  certbot_www:
