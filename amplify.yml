version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build
      artifacts:
        # IMPORTANT: the static SPA output lives in frontend/dist/client, NOT dist.
        # dist/ has no index.html (it also contains a server build), so pointing
        # Amplify at dist/ is what caused the 404 on https://leadgenplus.in/.
        # baseDirectory is relative to appRoot (frontend), so this = frontend/dist/client.
        baseDirectory: dist/client
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
